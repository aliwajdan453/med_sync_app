name: med_sync
description: "Medication routine and adherence tracking app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  go_router: ^17.3.0

  firebase_core: ^4.10.0
